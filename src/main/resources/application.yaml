server:
    port: 8080

spring:
    application:
        name: jokenpo
        version: 1.0.0
        
    h2:
        console:
            enabled: true

    datasource:
        url: jdbc:h2:mem:jokenpo
        driverClassName: org.h2.Driver
        username: sa
        password: 

    jpa:
        hibernate:
            ddl-auto: update
        show-sql: true
        properties:
            hibernate:
                dialect: org.hibernate.dialect.H2Dialect

springdoc:
    swagger-ui:
        path: /docs

